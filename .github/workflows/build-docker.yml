name: Build and Push Hunyuan3D Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'Notice.txt'
      - '.gitignore'
      - 'API_DOCUMENTATION.md'
      - 'API_TESTING_SUMMARY.md'
      - 'test_api.ipynb'
      - 'test_api_server.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/hunyuan3d-2.1:latest
            ghcr.io/${{ github.repository }}/hunyuan3d-2.1:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
